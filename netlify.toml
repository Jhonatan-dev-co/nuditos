# ══════════════════════════════════════════
#   NUDITOS — Netlify config
# ══════════════════════════════════════════

[build]
  command   = "npm run build"
  publish   = "dist"

# ── Entorno de build ──────────────────────
[build.environment]
  NODE_VERSION = "20"

# ══════════════════════════════════════════
#   HEADERS
# ══════════════════════════════════════════

# Seguridad global
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

# Assets con hash de Astro → caché larga
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Imágenes públicas → caché 1 semana
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# ── Páginas SSR (nunca cachear en CDN) ───
[[headers]]
  for = "/catalogo"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/catalogo/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/ramo/*"
  [headers.values]
    Cache-Control = "public, max-age=120, stale-while-revalidate=600"

[[headers]]
  for = "/admin"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# ══════════════════════════════════════════
#   REDIRECTS
# ══════════════════════════════════════════

# Página 404 personalizada (si la tienes)
[[redirects]]
  from   = "/*"
  to     = "/404"
  status = 404
