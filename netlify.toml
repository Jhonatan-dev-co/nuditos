[build]
  base      = "nuditos-astro"
  command   = "npm install && npx astro build"
  publish   = "nuditos-astro/dist"
  functions = "nuditos-astro/netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"